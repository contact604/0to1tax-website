<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무료 상담 신청 - 0to1tax</title>
    <meta name="description" content="0to1tax 스타트업 전문 세무회계 서비스 무료 상담 신청. 빠른 시일 내에 연락드리겠습니다.">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/rocket-icon.svg">
    
    <!-- Open Graph -->
    <meta property="og:title" content="무료 상담 신청 - 0to1tax">
    <meta property="og:description" content="스타트업의 첫 번째 CFO, 0to1tax에 문의하세요">
    <meta property="og:image" content="https://0to1tax.com/og-image.jpg">
    <meta property="og:url" content="https://0to1tax.com/contact-form.html">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #2563eb 50%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Background Animation */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: backgroundScroll 20s linear infinite;
            pointer-events: none;
        }
        
        @keyframes backgroundScroll {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        /* Container */
        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 3rem 2.5rem;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Logo */
        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo {
            height: 48px;
            margin-bottom: 1rem;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        
        .header-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .header-title {
            font-size: 2rem;
            font-weight: 700;
            color: #1e40af;
            margin-bottom: 0.5rem;
        }
        
        .header-subtitle {
            font-size: 1.125rem;
            color: #6b7280;
            line-height: 1.6;
        }
        
        /* Form */
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }
        
        .required {
            color: #ef4444;
        }
        
        .form-input,
        .form-textarea {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 1.25rem;
            background: linear-gradient(135deg, #1e40af 0%, #2563eb 50%, #3b82f6 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.125rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(30, 64, 175, 0.4);
        }
        
        .btn-submit:active {
            transform: translateY(0);
        }
        
        /* Success Message */
        .success-container {
            display: none;
            text-align: center;
            padding: 2rem 0;
        }
        
        .success-container.active {
            display: block;
        }
        
        .success-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            animation: scaleUp 0.6s ease-out;
        }
        
        @keyframes scaleUp {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .success-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1e40af;
            margin-bottom: 1rem;
        }
        
        .success-text {
            font-size: 1.125rem;
            color: #6b7280;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .btn-home {
            display: inline-block;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #1e40af 0%, #2563eb 50%, #3b82f6 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(30, 64, 175, 0.4);
        }
        
        /* Back Link */
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        
        .back-link a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .back-link a:hover {
            color: #1e40af;
            text-decoration: underline;
        }
        
        /* Mobile Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 2rem 1.5rem;
            }
            
            .header-title {
                font-size: 1.5rem;
            }
            
            .header-subtitle {
                font-size: 1rem;
            }
            
            .header-icon {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <div class="logo-container">
            <a href="/">
                <img src="/images/0to1tax-horizontal-blue.svg" alt="0to1tax" class="logo">
            </a>
        </div>
        
        <!-- Header -->
        <div class="header">
            <div class="header-icon">💼</div>
            <h1 class="header-title">무료 상담 신청</h1>
            <p class="header-subtitle">
                스타트업 세무·회계 전문가가<br>
                직접 상담해드립니다
            </p>
        </div>
        
        <!-- Form Container -->
        <div id="formContainer">
            <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" onsubmit="handleSubmit(event)">
                <input type="hidden" name="form-name" value="contact">
                <input type="hidden" name="bot-field">
                <input type="hidden" name="source" value="Contact Form Page">

                <div class="form-group">
                    <label class="form-label" for="company">
                        회사명 <span class="required">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="company" 
                        name="company" 
                        class="form-input" 
                        required 
                        placeholder="예: 스타트업 주식회사"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="name">
                        담당자 이름 <span class="required">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        class="form-input" 
                        required 
                        placeholder="예: 홍길동"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="contact">
                        연락처 또는 이메일 <span class="required">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="contact" 
                        name="contact" 
                        class="form-input" 
                        required 
                        placeholder="예: 010-1234-5678 또는 contact@startup.com"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="message">
                        한 줄 문의 내용 <span class="required">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="message" 
                        name="message" 
                        class="form-input" 
                        required 
                        placeholder="궁금하신 사항을 간단히 입력해주세요"
                    >
                </div>

                <button type="submit" class="btn-submit">
                    상담 신청하기 →
                </button>
            </form>
            
            <div class="back-link">
                <a href="/">← 홈으로 돌아가기</a>
            </div>
        </div>
        
        <!-- Success Message -->
        <div id="successContainer" class="success-container">
            <div class="success-icon">✅</div>
            <h2 class="success-title">상담 신청이 완료되었습니다!</h2>
            <p class="success-text">
                빠른 시일 내에 담당자가<br>
                연락드리겠습니다.
            </p>
            <a href="/" class="btn-home">홈으로 돌아가기</a>
        </div>
    </div>

    <script>
        // 폼 제출 처리
        function handleSubmit(e) {
            e.preventDefault();
            
            const form = e.target;
            const formData = new FormData(form);

            fetch('/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams(formData).toString()
            })
            .then(() => {
                // 성공 메시지 표시
                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('successContainer').classList.add('active');
            })
            .catch((error) => {
                alert('전송 중 오류가 발생했습니다. 다시 시도해주세요.');
                console.error('Error:', error);
            });
        }
    </script>
</body>
</html>
